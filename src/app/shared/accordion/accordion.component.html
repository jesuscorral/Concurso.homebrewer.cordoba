<mat-accordion>
    @for (row of rows; track row.title) {
        <mat-expansion-panel>
            <mat-expansion-panel-header>
                <mat-panel-title>
                    <mat-icon class="material-icons">{{row.icon}}</mat-icon>
                  </mat-panel-title>
                  <mat-panel-description>
                     {{row.title}}
                    </mat-panel-description>
            </mat-expansion-panel-header>
            <p class="mat-expansion-panel-body">
                <span [innerHTML]="row.content"></span>
            </p>
        </mat-expansion-panel>
    }
</mat-accordion>
