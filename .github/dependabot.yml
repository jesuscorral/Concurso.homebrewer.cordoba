version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Angular exige actualizar sus paquetes en bloque.
      angular:
        patterns:
          - '@angular*'
          - 'angular-eslint'
          - 'zone.js'
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
