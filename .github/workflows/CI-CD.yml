name: CI-CD_Firebase

on:
  push:
    branches:
      - master

permissions:
  contents: read

# Nunca dos despliegues a producción en paralelo; el último espera al anterior.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and deploy to Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (production)
        run: npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CONCURSOHOMEBREWERCORDOB_6D540 }}'
          projectId: concursohomebrewercordob-6d540
          channelId: live

      - name: Smoke check production
        run: |
          curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 10 --retry-all-errors \
            https://www.concursohomebrewercordoba.es/ | grep -qi "Concurso Homebrewer"
